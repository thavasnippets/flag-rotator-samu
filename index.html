<!DOCTYPE html>
<html lang="en">

<head>
    <title>Flag Rotator (From JSON)</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        img {
            width: 50%;
            height: auto;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            background: white;
        }

        .info {
            margin-top: 15px;
            font-size: 20px;
            text-align: center;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .controls button {
            padding: 10px;
            font-size: 18px;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            transition: background 0.2s;
        }

        .controls button:hover {
            background: #dddddd;
        }

        .controls button.active {
            background: #016106;
            color: white;
        }

        /* 🔥 FINAL SCREEN STYLE */
        .completed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: bold;
            text-align: center;
        }

        .completed div {
            font-size: 30px;
            font-weight: normal;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="info" style="display: none;" id="info"></div>

        let index = 0;
        let timeLeft = 3;
        let completed = 0;
        let totalTime = 0;
        let paused = false;

        const flagEl = document.getElementById("flag");
        const infoEl = document.getElementById("info");
        const timerEl = document.getElementById("timer");
        const countEl = document.getElementById("count");
        const statusEl = document.getElementById("status");
        const btn = document.getElementById('pauseBtn');
        function showFlag() {
            if (index >= countries.length) return;

            const country = countries[index];

            flagEl.src = country.flag_4x3;

            infoEl.innerHTML = `
                <strong>${country.name}</strong><br>
                ${country.capital ? "Capital: " + country.capital : "No capital"}
            `;

            index++;
            completed++;
            countEl.textContent = completed;

            timeLeft = 2;
            timerEl.textContent = timeLeft;
        }
        function togglePause() {
            paused = !paused;

            if (paused) {
                btn.textContent = "Play";
                btn.classList.add('active');

            }
            else {
                btn.textContent = "Pause";
                btn.classList.remove('active');
            }

        }
        const interval = setInterval(() => {
            if (paused) return;
            timeLeft--;
            totalTime++;

            timerEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                if (index >= countries.length) {
                    clearInterval(interval);

                    // hide normal UI
                    statusEl.style.display = "none";
                    flagEl.style.display = "none";
                    document.getElementById('controls').style.display = "none";
                    infoEl.classList.add("completed");

                    // final screen
                    infoEl.innerHTML = `
                        <div>Completed!</div>
                        <div>Total Time: ${(totalTime / 60).toFixed(2)} mins</div>
                        <div>Completed: ${completed}</div>
                    `;

                    return;
                }

                showFlag();
            }
        }, 1000);

        // initial load
        timerEl.textContent = timeLeft;
        showFlag();
